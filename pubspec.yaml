name: clip_ai
description: "ClipAI - AI-powered video editing app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.9.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_analytics: ^11.5.0
  firebase_crashlytics: ^4.3.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # Video Editing (free, no license required)
  ffmpeg_kit_flutter_new_min_gpl: ^1.1.0
  video_editor: ^3.0.0

  # Subscriptions
  purchases_flutter: ^8.6.0

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  iconsax_flutter: ^1.0.0+1

  # Storage
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Utils
  get_it: ^8.0.3
  permission_handler: ^11.4.0
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  gallery_saver_plus: ^3.2.5
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/watermark/
